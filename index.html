// ─── Responsive hook ─────────────────────────────────────────────────────
function useIsMobile(breakpoint = 768) {
  const [isMobile, setIsMobile] = useState(window.innerWidth < breakpoint);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < breakpoint);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, [breakpoint]);
  return isMobile;
}

// ─── Utility ─────────────────────────────────────────────────────────────
const rand = (a, b) => Math.random() * (b - a) + a;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// ─── Simulated Live Data ─────────────────────────────────────────────────
function generateLiveData(hour) {
  const isDaytime = hour >= 6 && hour <= 18;
  const isPeak = (hour >= 18 && hour <= 22) || (hour >= 7 && hour <= 10);
  const loadMult = isPeak ? rand(0.75, 0.95) : rand(0.35, 0.65);
  const solarMult = isDaytime ? Math.sin(((hour - 6) / 12) * Math.PI) * rand(0.6, 0.95) : 0;

  const feeders = FEEDERS.map(f => {
    const loadKw = f.capacity * loadMult * rand(0.85, 1.15);
    const inputE = loadKw * rand(1.0, 1.05);
    const outputE = loadKw * rand(0.78, 0.96);
    return { ...f, loadKw: Math.round(loadKw), loadPct: Math.round((loadKw / f.capacity) * 100), voltage: +(11 * rand(0.94, 1.06)).toFixed(2), current: +(loadKw / (11 * 1.732 * rand(0.85, 0.95))).toFixed(1), pf: +rand(0.82, 0.98).toFixed(2), inputEnergy: Math.round(inputE), outputEnergy: Math.round(outputE), lossPct: +((1 - outputE / inputE) * 100).toFixed(1), dataHealth: Math.random() > 0.15 ? "live" : "stale" };
  });

  const transformers = TRANSFORMERS.map(t => {
    const tLoadMult = loadMult * rand(0.7, 1.3);
    const loadKva = t.capacityKva * clamp(tLoadMult, 0.2, 1.15);
    const loadPct = (loadKva / t.capacityKva) * 100;
    const temp = 35 + loadPct * rand(0.3, 0.5);
    let health = "healthy";
    if (loadPct > 100) health = "critical";
    else if (loadPct > 85) health = "warning";
    else if (temp > 70) health = "warning";
    return { ...t, loadKva: Math.round(loadKva), loadPct: Math.round(loadPct), voltage: +(0.415 * rand(0.92, 1.08)).toFixed(3), temperature: Math.round(temp), health, dataHealth: Math.random() > 0.1 ? "live" : "stale" };
  });

  const ders = DER_ASSETS.map(d => {
    if (d.type === "ev") {
      const active = Math.random() > 0.3;
      const sessions = active ? Math.floor(rand(1, d.maxKw / 7)) : 0;
      const powerKw = active ? Math.round(sessions * rand(5, 11)) : 0;
      return { ...d, status: active ? "charging" : "idle", powerKw, sessions, dataHealth: Math.random() > 0.12 ? "live" : "stale" };
    } else {
      const gen = Math.round(d.maxKw * solarMult * rand(0.7, 1.0));
      return { ...d, status: gen > 0 ? "generating" : "offline", powerKw: gen, irradiance: Math.round(solarMult * 1000), dataHealth: Math.random() > 0.1 ? "live" : "stale" };
    }
  });

  const homes = HOMES.map(h => ({ ...h, demandKw: Math.round(h.count * rand(0.3, 1.2)), avgVoltage: +(230 * rand(0.92, 1.08)).toFixed(0), dataHealth: Math.random() > 0.2 ? "live" : "stale" }));

  const industries = INDUSTRIES.map(ind => {
    const indLoadMult = isPeak ? rand(0.7, 0.95) : rand(0.5, 0.85);
    const demandKw = Math.round(ind.contractDemand * indLoadMult);
    const solarGen = Math.round(ind.solarCapacity * solarMult * rand(0.6, 0.95));
    const pf = +rand(0.88, 0.98).toFixed(2);
    return { ...ind, demandKw, solarGen, netDemand: demandKw - solarGen, loadPct: Math.round((demandKw / ind.contractDemand) * 100), pf, voltage: +(33 * rand(0.96, 1.04)).toFixed(1), dataHealth: Math.random() > 0.08 ? "live" : "stale" };
  });

  return { feeders, transformers, ders, homes, industries, timestamp: new Date() };
}

function generateAlerts(data) {
  const alerts = [];
  const now = new Date();
  data.transformers.forEach(t => {
    if (t.loadPct > 100) alerts.push({ id: `AL-${t.id}-OL`, severity: "critical", message: `${t.name} OVERLOADED at ${t.loadPct}%`, asset: t.id, time: new Date(now - rand(0, 300000)), type: "overload" });
    else if (t.loadPct > 85) alerts.push({ id: `AL-${t.id}-HI`, severity: "warning", message: `${t.name} high load: ${t.loadPct}%`, asset: t.id, time: new Date(now - rand(0, 600000)), type: "overload" });
    if (t.temperature > 70) alerts.push({ id: `AL-${t.id}-TMP`, severity: "warning", message: `${t.name} temp: ${t.temperature} deg C`, asset: t.id, time: new Date(now - rand(0, 400000)), type: "thermal" });
  });
  data.feeders.forEach(f => {
    if (f.voltage < 10.5 || f.voltage > 11.5) alerts.push({ id: `AL-${f.id}-V`, severity: "warning", message: `${f.name} voltage: ${f.voltage} kV`, asset: f.id, time: new Date(now - rand(0, 500000)), type: "voltage" });
    if (f.lossPct > 18) alerts.push({ id: `AL-${f.id}-LOSS`, severity: "critical", message: `${f.name} losses at ${f.lossPct}% — possible theft zone`, asset: f.id, time: new Date(now - rand(0, 200000)), type: "theft" });
    if (f.loadPct > 90) alerts.push({ id: `AL-${f.id}-PK`, severity: "critical", message: `${f.name} at ${f.loadPct}% capacity`, asset: f.id, time: new Date(now - rand(0, 100000)), type: "overload" });
  });
  const peakT = data.transformers.reduce((a, b) => a.loadPct > b.loadPct ? a : b);
  if (peakT.loadPct > 70) alerts.push({ id: "AI-PRED-1", severity: "insight", message: `${peakT.name} predicted to overload by 7:30 PM — consider load shifting`, asset: peakT.id, time: now, type: "prediction" });
  const highLossF = data.feeders.reduce((a, b) => a.lossPct > b.lossPct ? a : b);
  if (highLossF.lossPct > 12) alerts.push({ id: "AI-LOSS-1", severity: "insight", message: `${highLossF.name} losses at ${highLossF.lossPct}% — investigate section 3-4 for theft`, asset: highLossF.id, time: now, type: "theft" });
  const totalEv = data.ders.filter(d => d.type === "ev").reduce((s, d) => s + d.powerKw, 0);
  if (totalEv > 80) alerts.push({ id: "AI-EV-1", severity: "insight", message: `EV load at ${totalEv} kW — shift ${Math.round(totalEv * 0.4)} kW to off-peak to reduce peak by ~${Math.round(totalEv * 0.4 / data.feeders[0].capacity * 100)}%`, asset: "EV", time: now, type: "ev_load" });
  alerts.push({ id: "AI-WX-1", severity: "insight", message: `High temperature forecast (42 deg C) — transformer cooling reduced, pre-position load shedding`, asset: "WEATHER", time: now, type: "weather" });
  return alerts.sort((a, b) => b.time - a.time);
}

// ─── Sparkline ───────────────────────────────────────────────────────────
function Sparkline({ data, color = "#00e5a0", w = 80, h = 24 }) {
  if (!data || data.length < 2) return null;
  const mn = Math.min(...data), mx = Math.max(...data), r = mx - mn || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - mn) / r) * h}`).join(" ");
  return <svg width={w} height={h} style={{ display: "block" }}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" /></svg>;
}

// ─── Mini Bar Chart ──────────────────────────────────────────────────────
function MiniBarChart({ data, labels, color = "#2a7d8c", w = 240, h = 90 }) {
  const mx = Math.max(...data);
  const bw = (w / data.length) * 0.6;
  const gap = (w / data.length) * 0.4;
  const t = S.t;
  return (
    <svg width={w} height={h + 20} style={{ display: "block" }}>
      {data.map((v, i) => {
        const bh = (v / mx) * h;
        const x = i * (bw + gap) + gap / 2;
        return (
          <g key={i}>
            <rect x={x} y={h - bh} width={bw} height={bh} rx={3} fill={v === mx ? t.red : color} opacity={0.85} />
            <text x={x + bw / 2} y={h + 14} textAnchor="middle" fill={t.textDim} fontSize="9" fontFamily="inherit">{labels?.[i] || i}</text>
            <text x={x + bw / 2} y={h - bh - 4} textAnchor="middle" fill={t.textBright} fontSize="9" fontFamily="inherit" fontWeight="600">{v}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ─── History hook ────────────────────────────────────────────────────────
function useHistory(items, key, maxLen = 30) {
  const ref = useRef({});
  useEffect(() => {
    items.forEach(f => {
      if (!ref.current[f.id]) ref.current[f.id] = [];
      ref.current[f.id].push(f[key]);
      if (ref.current[f.id].length > maxLen) ref.current[f.id].shift();
    });
  }, [items]);
  return ref.current;
}

  { voltage: 132, points: [[21.28,81.65],[21.27,81.62],[21.26,81.60],[21.29,81.61]] },
  { voltage: 132, points: [[21.19,81.29],[21.19,81.27],[21.18,81.28],[21.20,81.30]] },
  { voltage: 132, points: [[22.35,82.69],[22.36,82.66],[22.35,82.65]] },
  { voltage: 132, points: [[22.08,82.14],[22.09,82.12],[22.10,82.11]] },
  { voltage: 132, points: [[21.19,81.29],[21.18,81.30],[21.17,81.31]] },
];

// ─── GIS MAP VIEW (SVG-based, no external tiles) ────────────────────────
function GISView({ data, mob }) {
  const [selectedAsset, setSelectedAsset] = useState(null);
  const [visibleLayers, setVisibleLayers] = useState({ substation: true, feeder: true, transformer: true, home: true, ev_charger: true, ev_park: true, solar: true });
  const [metricConfig, setMetricConfig] = useState({ voltage: true, load: true, temperature: true, losses: true, pf: false });
  const [uploads, setUploads] = useState({});
  const [aiProcessing, setAiProcessing] = useState(null);
  const [aiResults, setAiResults] = useState({});
  const fileInputRef = useRef(null);
  const [analyticsAsset, setAnalyticsAsset] = useState(null);
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const markersRef = useRef([]);
  const [leafletReady, setLeafletReady] = useState(false);

  // Load Leaflet once
  useEffect(() => {
    if (mapInstance.current || !mapRef.current) return;
    if (!document.getElementById("leaflet-css")) {
      const link = document.createElement("link"); link.id = "leaflet-css"; link.rel = "stylesheet";
      link.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"; document.head.appendChild(link);
    }
    const loadLeaflet = () => {
      if (window.L) { initMap(); return; }
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
      script.onload = initMap; document.head.appendChild(script);
    };
    const initMap = () => {
      const L = window.L;
      const map = L.map(mapRef.current, { zoomControl: false, attributionControl: false }).setView([21.75, 81.95], 8);
      L.control.zoom({ position: "bottomright" }).addTo(map);
      // Dark tiles from CARTO, fallback to OSM
      L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", { maxZoom: 19 }).addTo(map);
      mapInstance.current = map; setLeafletReady(true);
    };
    loadLeaflet();
    return () => { if (mapInstance.current) { mapInstance.current.remove(); mapInstance.current = null; } };
  }, []);

  // Update markers
  useEffect(() => {
    if (!leafletReady || !window.L || !mapInstance.current) return;
    const L = window.L; const map = mapInstance.current;
    markersRef.current.forEach(m => map.removeLayer(m)); markersRef.current = [];

    const mkIcon = (color, size, txt) => L.divIcon({
      className: "", iconSize: [size, size], iconAnchor: [size / 2, size / 2],
      html: `<div style="width:${size}px;height:${size}px;border-radius:${size/2}px;background:${color};border:2px solid ${color};box-shadow:0 0 10px ${color}50;display:flex;align-items:center;justify-content:center;font-size:${Math.max(size*0.38,8)}px;color:#060a13;font-weight:800;font-family:monospace;cursor:pointer">${txt}</div>`,
    });

    // Transmission lines (from CSPTCL grid map)
    TRANSMISSION_LINES.forEach(line => {
      const color = line.voltage >= 400 ? "#0ea5e9" : line.voltage >= 220 ? "#f59e0b" : "#6b8f71";
      const weight = line.voltage >= 400 ? 3 : line.voltage >= 220 ? 2.2 : 1.5;
      const ln = L.polyline(line.points, { color, weight, opacity: 0.7 }).addTo(map);
      // Add voltage label at midpoint
      const mid = line.points[Math.floor(line.points.length / 2)];
      const label = L.marker(mid, { icon: L.divIcon({
        className: "", iconSize: [60, 16], iconAnchor: [30, 8],
        html: `<div style="font-size:9px;font-weight:700;color:${color};font-family:DM Sans,sans-serif;text-shadow:0 0 4px rgba(255,255,255,0.9),0 0 2px rgba(255,255,255,1);white-space:nowrap;text-align:center">${line.voltage} kV</div>`,
      })}).addTo(map);
      markersRef.current.push(ln, label);
    });

    // Substations
    if (visibleLayers.substation) SUBSTATIONS.forEach(ss => {
      const m = L.marker([ss.lat, ss.lng], { icon: mkIcon("#f0f4f8", 26, "SS") }).addTo(map)
        .on("click", () => setSelectedAsset({ ...ss, assetType: "substation", dataHealth: "live" }));
      markersRef.current.push(m);
    });

    // Feeders + lines
    if (visibleLayers.feeder) data.feeders.forEach(f => {
      const c = f.loadPct > 90 ? "#ff3b5c" : f.loadPct > 75 ? "#ffb800" : "#00e5a0";
      const m = L.marker([f.lat, f.lng], { icon: mkIcon(c, 22, "F") }).addTo(map)
        .on("click", () => setSelectedAsset({ ...f, assetType: "feeder" }));
      markersRef.current.push(m);
      const ss = SUBSTATIONS[0];
      const ln = L.polyline([[ss.lat, ss.lng], [f.lat, f.lng]], { color: f.color, weight: 1.5, opacity: 0.4, dashArray: "5 5" }).addTo(map);
      markersRef.current.push(ln);
    });

    // Transformers + lines
    if (visibleLayers.transformer) data.transformers.forEach(t => {
      const c = t.health === "critical" ? "#ff3b5c" : t.health === "warning" ? "#ffb800" : "#ffb800";
      const m = L.marker([t.lat, t.lng], { icon: mkIcon(c, 16, "T") }).addTo(map)
        .on("click", () => setSelectedAsset({ ...t, assetType: "transformer" }));
      markersRef.current.push(m);
      const feeder = data.feeders.find(f => f.id === t.feederId);
      if (feeder) { const ln = L.polyline([[feeder.lat, feeder.lng], [t.lat, t.lng]], { color: feeder.color, weight: 1, opacity: 0.25 }).addTo(map); markersRef.current.push(ln); }
    });

    // Homes
    if (visibleLayers.home) data.homes.forEach(h => {
      const m = L.marker([h.lat, h.lng], { icon: mkIcon("#8e7cc3", 13, "H") }).addTo(map)
        .on("click", () => setSelectedAsset({ ...h, assetType: "home" }));
      markersRef.current.push(m);
    });

    // EVs
    data.ders.filter(d => d.type === "ev").forEach(d => {
      const layerKey = d.subtype === "park" ? "ev_park" : "ev_charger";
      if (!visibleLayers[layerKey]) return;
      const c = d.status === "charging" ? "#007aff" : "#3a4a5e";
      const m = L.marker([d.lat, d.lng], { icon: mkIcon(c, d.subtype === "park" ? 20 : 14, "EV") }).addTo(map)
        .on("click", () => setSelectedAsset({ ...d, assetType: layerKey }));
      markersRef.current.push(m);
    });

    // Solar
    if (visibleLayers.solar) data.ders.filter(d => d.type === "solar").forEach(d => {
      const c = d.status === "generating" ? "#ffb800" : "#3a4a5e";
      const m = L.marker([d.lat, d.lng], { icon: mkIcon(c, 14, "☀") }).addTo(map)
        .on("click", () => setSelectedAsset({ ...d, assetType: "solar" }));
      markersRef.current.push(m);
    });
  }, [data, visibleLayers, leafletReady]);

  // If analytics view is active, show it instead of the map
  if (analyticsAsset) {
    return <AssetAnalytics asset={analyticsAsset} onBack={() => setAnalyticsAsset(null)} mob={mob} />;
  }

  return (
    <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 270px", gap: 12, height: mob ? "auto" : "calc(100vh - 130px)" }}>
      <div style={{ ...S.card, padding: 0, overflow: "hidden", position: "relative", height: mob ? 350 : "auto" }}>
        {/* Leaflet Map */}
        <div ref={mapRef} style={{ width: "100%", height: "100%" }} />

        {/* Legend overlay */}
        <div style={{ position: "absolute", top: 10, left: 10, zIndex: 1000, background: `${S.t.bgCard}ee`, borderRadius: 8, padding: 10, border: `1px solid ${S.t.border}`, maxWidth: 170 }}>
          <div style={{ ...S.label, marginBottom: 5 }}>Asset Layers</div>
          {Object.entries(LEGEND).map(([key, val]) => (
            <label key={key} style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 3, fontSize: 9, cursor: "pointer", color: visibleLayers[key] ? "#c8d6e5" : "#3a4a5e" }}>
              <input type="checkbox" checked={visibleLayers[key]} onChange={() => setVisibleLayers(v => ({ ...v, [key]: !v[key] }))} style={{ accentColor: val.color, width: 11, height: 11 }} />
              <LegendDot color={val.color} size={8} />
              {val.label}
            </label>
          ))}
        </div>
      </div>

      {/* Sidebar */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, overflowY: "auto" }}>
        {/* Metrics Config Panel */}
        <div style={S.card}>
          <div style={S.glow("#007aff")} />
          <div style={S.label}>Tracked Metrics</div>
          <div style={{ fontSize: 8, color: "#3a4a5e", marginBottom: 6 }}>Select which metrics to display when inspecting assets</div>
          {Object.entries(metricConfig).map(([key, val]) => (
            <label key={key} style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 3, fontSize: 10, cursor: "pointer", color: val ? "#c8d6e5" : "#3a4a5e" }}>
              <input type="checkbox" checked={val} onChange={() => setMetricConfig(m => ({ ...m, [key]: !m[key] }))} style={{ accentColor: "#007aff", width: 11, height: 11 }} />
              {key.charAt(0).toUpperCase() + key.slice(1)}
            </label>
          ))}
        </div>

        {/* Selected Asset */}
        <div style={S.card}>
          <div style={S.glow("#00e5a0")} />
          <div style={S.label}>Asset Metadata</div>
          {selectedAsset ? (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: "#f0f4f8" }}>{selectedAsset.name}</span>
                <DataHealthBadge status={selectedAsset.dataHealth || "live"} />
              </div>
              <div style={{ fontSize: 8, color: "#5a6e83", marginBottom: 6 }}>ID: {selectedAsset.id} | Type: {selectedAsset.assetType}</div>
              <div style={{ fontSize: 10, display: "flex", flexDirection: "column", gap: 4 }}>
                {selectedAsset.assetType === "substation" && <>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Capacity</span><span style={{ fontWeight: 700 }}>{selectedAsset.capacityMva} MVA</span></div>
                </>}
                {selectedAsset.assetType === "feeder" && <>
                  {metricConfig.load && <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Load</span><span style={{ fontWeight: 700 }}>{selectedAsset.loadKw} kW ({selectedAsset.loadPct}%)</span></div>}
                  {metricConfig.voltage && <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Voltage</span><span>{selectedAsset.voltage} kV</span></div>}
                  {metricConfig.pf && <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>PF</span><span>{selectedAsset.pf}</span></div>}
                  {metricConfig.losses && <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Losses</span><span style={{ color: selectedAsset.lossPct > 15 ? "#ff3b5c" : "#ffb800", fontWeight: 700 }}>{selectedAsset.lossPct}%</span></div>}
                </>}
                {selectedAsset.assetType === "transformer" && <>
                  {metricConfig.load && <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Load</span><span style={{ fontWeight: 700 }}>{selectedAsset.loadKva} kVA ({selectedAsset.loadPct}%)</span></div>}
                  {metricConfig.voltage && <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Voltage</span><span>{selectedAsset.voltage} kV</span></div>}
                  {metricConfig.temperature && <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Temp</span><span style={{ color: selectedAsset.temperature > 70 ? "#ff3b5c" : "#c8d6e5" }}>{selectedAsset.temperature} C</span></div>}
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Health</span><span style={S.badge(selectedAsset.health)}>{selectedAsset.health}</span></div>
                </>}
                {selectedAsset.assetType === "home" && <>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Consumers</span><span style={{ fontWeight: 700 }}>{selectedAsset.count}</span></div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Demand</span><span style={{ fontWeight: 700 }}>{selectedAsset.demandKw} kW</span></div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Avg Voltage</span><span>{selectedAsset.avgVoltage} V</span></div>
                </>}
                {(selectedAsset.assetType === "ev_charger" || selectedAsset.assetType === "ev_park") && <>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Power</span><span style={{ color: "#007aff", fontWeight: 700 }}>{selectedAsset.powerKw} kW</span></div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Status</span><span style={S.badge(selectedAsset.status)}>{selectedAsset.status}</span></div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Sessions</span><span>{selectedAsset.sessions || 0}</span></div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Capacity</span><span>{selectedAsset.maxKw} kW</span></div>
                </>}
                {selectedAsset.assetType === "solar" && <>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Generation</span><span style={{ color: "#ffb800", fontWeight: 700 }}>{selectedAsset.powerKw} kW</span></div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Status</span><span style={S.badge(selectedAsset.status)}>{selectedAsset.status}</span></div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#5a6e83" }}>Capacity</span><span>{selectedAsset.maxKw} kW</span></div>
                </>}
              </div>
              <div style={{ marginTop: 6, padding: "4px 6px", background: "#111a2b", borderRadius: 3, fontSize: 8, color: "#5a6e83" }}>
                Coords: {selectedAsset.lat?.toFixed(4)}, {selectedAsset.lng?.toFixed(4)}
              </div>

              {/* View Analytics Button */}
              <button
                onClick={() => setAnalyticsAsset(selectedAsset)}
                style={{ width: "100%", marginTop: 8, padding: "7px 0", background: "linear-gradient(135deg, rgba(0,229,160,0.15), rgba(0,122,255,0.15))", border: "1px solid #00e5a030", borderRadius: 4, color: "#00e5a0", fontSize: 9, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", letterSpacing: 0.5, display: "flex", alignItems: "center", justifyContent: "center", gap: 5 }}
              >
                📊 VIEW ANALYTICS — Half-Hourly Profile
              </button>

              {/* ── Recommended Telemetry Devices ── */}
              {(() => {
                const tag = ASSET_TO_DEVICE_TAG[selectedAsset.assetType];
                const recommended = tag ? DEVICES.filter(d => d.assetTags.includes(tag)) : [];
                if (!recommended.length) return null;
                return (
                  <div style={{ marginTop: 10, borderTop: `1px solid ${S.t.border}`, paddingTop: 8 }}>
                    <div style={{ ...S.label, marginBottom: 6 }}>Recommended Telemetry</div>
                    {recommended.slice(0, 3).map(dev => (
                      <div key={dev.id} style={{ padding: "6px", background: S.t.bgInner, borderRadius: 5, marginBottom: 4, border: `1px solid ${S.t.border}` }}>
                        <div style={{ display: "flex", gap: 6, alignItems: "flex-start" }}>
                          <img src={dev.image} alt="" style={{ width: 28, height: 28, borderRadius: 4, objectFit: "cover" }} onError={(e) => { e.target.style.display = "none"; }} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 9, fontWeight: 700, color: S.t.textBright, lineHeight: 1.2 }}>{dev.name}</div>
                            <div style={{ fontSize: 7, color: S.t.textDim, marginTop: 2 }}>{dev.category} • {dev.protocol}</div>
                            <div style={{ fontSize: 7, color: S.t.textMuted, marginTop: 1 }}>{dev.supplier} • {dev.origin}</div>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4 }}>
                              <span style={{ fontSize: 11, fontWeight: 800, color: S.t.green }}>₹{dev.price.toLocaleString("en-IN")}</span>
                              <button style={{ background: `${S.t.blue}18`, border: `1px solid ${S.t.blue}40`, borderRadius: 3, color: S.t.blue, fontSize: 7, padding: "2px 6px", cursor: "pointer", fontFamily: "inherit", fontWeight: 700 }}>REQUEST INFO</button>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                    <div style={{ fontSize: 7, color: S.t.textMuted, textAlign: "center", marginTop: 2 }}>See all in Marketplace tab →</div>
                  </div>
                );
              })()}

              {/* ── Upload & AI Extraction ── */}
              <div style={{ marginTop: 10, borderTop: "1px solid #1a2235", paddingTop: 8 }}>
                <div style={{ ...S.label, marginBottom: 6 }}>Documents & AI Extract</div>
                <input
                  ref={fileInputRef}
                  type="file"
                  accept=".pdf,.jpg,.jpeg,.png,.docx"
                  multiple
                  style={{ display: "none" }}
                  onChange={(e) => {
                    const files = Array.from(e.target.files || []);
                    if (!files.length || !selectedAsset) return;
                    const assetId = selectedAsset.id;
                    const newFiles = files.map(f => ({
                      name: f.name,
                      size: (f.size / 1024).toFixed(1) + " KB",
                      type: f.name.split(".").pop().toUpperCase(),
                      uploadedAt: new Date().toLocaleTimeString(),
                    }));
                    setUploads(prev => ({ ...prev, [assetId]: [...(prev[assetId] || []), ...newFiles] }));
                    // Simulate AI processing
                    setAiProcessing(assetId);
                    setTimeout(() => {
                      const fakeExtracted = {};
                      files.forEach(f => {
                        const ext = f.name.split(".").pop().toLowerCase();
                        if (ext === "pdf" || ext === "docx") {
                          fakeExtracted[f.name] = [
                            { field: "Make", value: "Crompton Greaves", confidence: 94 },
                            { field: "Rating", value: selectedAsset.capacityKva ? `${selectedAsset.capacityKva} kVA` : selectedAsset.capacity ? `${selectedAsset.capacity} kW` : "250 kVA", confidence: 97 },
                            { field: "Year of Install", value: "2019", confidence: 88 },
                            { field: "Oil Type", value: "Mineral Oil", confidence: 91 },
                            { field: "Serial No.", value: "CG-" + Math.random().toString(36).substr(2, 8).toUpperCase(), confidence: 96 },
                            { field: "Last Maintenance", value: "14-Nov-2025", confidence: 82 },
                          ];
                        } else {
                          fakeExtracted[f.name] = [
                            { field: "Nameplate Detected", value: "Yes", confidence: 95 },
                            { field: "Make (OCR)", value: "Crompton Greaves", confidence: 87 },
                            { field: "Rating (OCR)", value: selectedAsset.capacityKva ? `${selectedAsset.capacityKva} kVA` : "250 kVA", confidence: 83 },
                            { field: "Condition", value: "Rust on enclosure, oil level normal", confidence: 76 },
                            { field: "Serial No. (OCR)", value: "CG-" + Math.random().toString(36).substr(2, 8).toUpperCase(), confidence: 79 },
                          ];
                        }
                      });
                      setAiResults(prev => ({ ...prev, [assetId]: { ...prev[assetId], ...fakeExtracted } }));
                      setAiProcessing(null);
                    }, 2500);
                    e.target.value = "";
                  }}
                />
                <button
                  onClick={() => fileInputRef.current?.click()}
                  style={{ width: "100%", padding: "7px 0", background: "rgba(0,122,255,0.1)", border: "1px solid #007aff30", borderRadius: 4, color: "#007aff", fontSize: 9, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", letterSpacing: 0.5, display: "flex", alignItems: "center", justifyContent: "center", gap: 5 }}
                >
                  <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 1v10M4 5l4-4 4 4" stroke="#007aff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="#007aff" strokeWidth="1.5" strokeLinecap="round"/></svg>
                  UPLOAD (PDF, JPG, PNG, DOCX)
                </button>

                {/* Uploaded files list */}
                {(uploads[selectedAsset.id] || []).length > 0 && (
                  <div style={{ marginTop: 6 }}>
                    {uploads[selectedAsset.id].map((f, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "4px 6px", background: "#111a2b", borderRadius: 3, marginBottom: 3, fontSize: 8 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                          <span style={{ background: f.type === "PDF" ? "#ff3b5c20" : f.type === "DOCX" ? "#007aff20" : "#ffb80020", color: f.type === "PDF" ? "#ff3b5c" : f.type === "DOCX" ? "#007aff" : "#ffb800", padding: "1px 4px", borderRadius: 2, fontWeight: 700, fontSize: 7 }}>{f.type}</span>
                          <span style={{ color: "#c8d6e5" }}>{f.name.length > 18 ? f.name.slice(0, 18) + "..." : f.name}</span>
                        </div>
                        <span style={{ color: "#3a5068" }}>{f.size}</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* AI Processing indicator */}
                {aiProcessing === selectedAsset.id && (
                  <div style={{ marginTop: 6, padding: "8px", background: "rgba(0,122,255,0.06)", border: "1px solid #007aff20", borderRadius: 4, textAlign: "center" }}>
                    <div style={{ fontSize: 9, color: "#007aff", fontWeight: 600, marginBottom: 4 }}>AI Processing...</div>
                    <div style={{ fontSize: 8, color: "#5a6e83" }}>Running OCR & LLM extraction</div>
                    <div style={{ marginTop: 4, height: 3, background: "#1a2235", borderRadius: 2, overflow: "hidden" }}>
                      <div style={{ height: "100%", background: "#007aff", borderRadius: 2, width: "60%", animation: "pulse 1s infinite" }} />
                    </div>
                  </div>
                )}

                {/* AI Extracted Results */}
                {aiResults[selectedAsset.id] && Object.entries(aiResults[selectedAsset.id]).map(([fileName, fields]) => (
                  <div key={fileName} style={{ marginTop: 6, border: "1px solid #007aff20", borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ padding: "4px 6px", background: "rgba(0,122,255,0.08)", fontSize: 8, fontWeight: 600, color: "#007aff", display: "flex", alignItems: "center", gap: 4 }}>
                      <span>🧠</span> AI Extracted — {fileName.length > 20 ? fileName.slice(0, 20) + "..." : fileName}
                    </div>
                    {fields.map((f, i) => (

// ─── NETWORK OVERVIEW ────────────────────────────────────────────────────
function NetworkOverview({ data, mob }) {
  const totalLoad = data.feeders.reduce((s, f) => s + f.loadKw, 0);
  const totalCap = data.feeders.reduce((s, f) => s + f.capacity, 0);
  const avgLoss = +(data.feeders.reduce((s, f) => s + f.lossPct, 0) / data.feeders.length).toFixed(1);
  const totalSolar = data.ders.filter(d => d.type === "solar").reduce((s, d) => s + d.powerKw, 0);
  const totalEv = data.ders.filter(d => d.type === "ev").reduce((s, d) => s + d.powerKw, 0);

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: mob ? "repeat(2, 1fr)" : "repeat(5, 1fr)", gap: mob ? 8 : 12, marginBottom: 14 }}>
        {[
          { label: "Total Load", value: totalLoad, unit: "kW", color: S.t.blue },
          { label: "Utilization", value: Math.round(totalLoad / totalCap * 100), unit: "%", color: totalLoad / totalCap > 0.85 ? S.t.red : S.t.green },
          { label: "Avg Loss", value: avgLoss, unit: "%", color: avgLoss > 15 ? S.t.red : S.t.yellow },
          { label: "Solar", value: totalSolar, unit: "kW", color: S.t.yellow },

          <div key={i} style={S.card}><div style={S.glow(k.color)} /><div style={{ ...S.label, paddingLeft: 8 }}>{k.label}</div><div style={{ ...S.bigNum, paddingLeft: 8 }}><span style={{ color: k.color }}>{k.value}</span><span style={S.unit}>{k.unit}</span></div></div>
        ))}
      </div>
      <div style={S.card}>
        <div style={S.glow(S.t.blue)} />
        <div style={{ ...S.label, paddingLeft: 8 }}>Single Line Diagram</div>
        <div style={{ overflowX: "auto" }}>
        <div style={{ display: "flex", gap: mob ? 12 : 24, padding: "14px 8px", minWidth: mob ? 700 : "auto", flexWrap: mob ? "nowrap" : "wrap", justifyContent: "center" }}>

            const ssColor = { "SS-RPR": S.t.green, "SS-KRB": S.t.yellow, "SS-DRG": S.t.purple, "SS-BSP": S.t.blue }[ss.id] || S.t.blue;
            return (
              <div key={ss.id} style={{ textAlign: "center", flex: "0 0 auto" }}>

                <div style={{ width: 54, height: 54, borderRadius: 8, border: `2px solid ${ssColor}`, background: `${ssColor}10`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto", fontWeight: 700, fontSize: 9, color: ssColor, flexDirection: "column", lineHeight: 1.2 }}>
                  <span style={{ fontSize: 7, opacity: 0.7 }}>{ss.voltage.split("/")[0]}</span>
                  <span>SS</span>
                </div>
                <div style={{ fontSize: 7, color: S.t.textDim, marginTop: 3, fontWeight: 600 }}>{ss.division}</div>
                <div style={{ width: 2, height: 10, background: S.t.border, margin: "4px auto" }} />
                {/* Feeders */}
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center", maxWidth: ssFeeders.length > 4 ? 280 : 200 }}>
                  {ssFeeders.map(f => {

      </div>
    </div>
  );
}

// ─── ALERTS ──────────────────────────────────────────────────────────────
function AlertsView({ alerts, mob }) {
  const [filter, setFilter] = useState("all");
  const filtered = filter === "all" ? alerts : alerts.filter(a => a.severity === filter);
  const counts = { critical: alerts.filter(a => a.severity === "critical").length, warning: alerts.filter(a => a.severity === "warning").length, insight: alerts.filter(a => a.severity === "insight").length };
  const t = S.t;

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: mob ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: mob ? 8 : 10, marginBottom: 14 }}>
        {[
          { key: "all", label: "Total", count: alerts.length, color: t.textBright },
          { key: "critical", label: "Critical", count: counts.critical, color: t.red },
          { key: "warning", label: "Warnings", count: counts.warning, color: t.yellow },
          { key: "insight", label: "AI Insights", count: counts.insight, color: t.blue },
        ].map(k => (
          <div key={k.key} style={{ ...S.card, cursor: "pointer", border: filter === k.key ? `1px solid ${k.color}40` : `1px solid ${t.border}` }} onClick={() => setFilter(k.key)}>
            <div style={S.glow(k.color)} /><div style={{ ...S.label, paddingLeft: 8 }}>{k.label}</div><div style={{ ...S.bigNum, color: k.color, paddingLeft: 8 }}>{k.count}</div>
          </div>
        ))}
      </div>
      <div style={S.card}>
        <div style={S.glow(t.red)} />
        <div style={{ ...S.label, paddingLeft: 8 }}>Alert Feed — {filter.toUpperCase()}</div>
        <div style={{ maxHeight: 440, overflowY: "auto" }}>
          {filtered.map(a => (
            <div key={a.id} style={S.alertRow(a.severity)}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: { critical: t.red, warning: t.yellow, insight: t.blue }[a.severity], marginTop: 4, flexShrink: 0 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: t.textBright, fontWeight: a.severity === "insight" ? 600 : 500 }}>
                  {a.severity === "insight" && <span style={{ color: t.blue, marginRight: 4, fontSize: 9 }}>AI</span>}
                  {a.type === "theft" && <span style={{ color: t.red, marginRight: 4, fontSize: 9 }}>THEFT</span>}
                  {a.type === "ev_load" && <span style={{ color: t.blue, marginRight: 4, fontSize: 9 }}>EV</span>}
                  {a.type === "weather" && <span style={{ color: t.yellow, marginRight: 4, fontSize: 9 }}>WX</span>}

                </div>
                <div style={{ fontSize: 8, color: t.textDim, marginTop: 2 }}>{a.asset} | {a.time.toLocaleTimeString()}</div>
              </div>
              {a.severity !== "insight" && <button style={{ background: `${t.blue}08`, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textDim, fontSize: 9, padding: "4px 8px", cursor: "pointer", fontFamily: "inherit" }}>ACK</button>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

          <div style={{ fontSize: 24 }}>🌡️</div>

          </div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 12 }}>

        </div>
        <div style={S.card}>
          <div style={S.glow(t.green)} /><div style={{ ...S.label, paddingLeft: 8 }}>Total Load Forecast</div>

          <div style={{ marginTop: 8, fontSize: 9, color: t.textDim, padding: "6px 8px", background: t.bgInner, borderRadius: 4 }}>

          </div>
        </div>
        <div style={S.card}>
          <div style={S.glow(t.yellow)} /><div style={{ ...S.label, paddingLeft: 8 }}>Solar Generation Forecast</div>

      <div style={{ ...S.card, marginTop: 12 }}>

      </div>
    </div>
  );

// ─── DER MANAGEMENT ──────────────────────────────────────────────────────
function DERView({ data, mob }) {
  const evAssets = data.ders.filter(d => d.type === "ev");
  const solarAssets = data.ders.filter(d => d.type === "solar");
  const totalEv = evAssets.reduce((s, d) => s + d.powerKw, 0);
  const totalSolar = solarAssets.reduce((s, d) => s + d.powerKw, 0);
  const totalLoad = data.feeders.reduce((s, f) => s + f.loadKw, 0);
  const netLoad = totalLoad - totalSolar;

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: mob ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: mob ? 8 : 10, marginBottom: 12 }}>
        {[
          { label: "EV Load", value: totalEv, unit: "kW", color: "#007aff" },
          { label: "Solar Gen", value: totalSolar, unit: "kW", color: "#ffb800" },
          { label: "Net Demand", value: Math.round(netLoad), unit: "kW", color: "#00e5a0" },
          { label: "Solar %", value: totalLoad > 0 ? ((totalSolar / totalLoad) * 100).toFixed(1) : 0, unit: "%", color: "#ffb800" },
        ].map((k, i) => (
          <div key={i} style={S.card}><div style={S.glow(k.color)} /><div style={S.label}>{k.label}</div><div style={S.bigNum}><span style={{ color: k.color }}>{k.value}</span><span style={S.unit}>{k.unit}</span></div></div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 12 }}>
        <div style={S.card}>
          <div style={S.glow("#007aff")} /><div style={S.label}>EV Assets</div>
          {evAssets.map(d => (
            <div key={d.id} style={{ padding: "7px 0", borderBottom: "1px solid #111a2b", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#f0f4f8" }}>{d.name}</div>
                <div style={{ fontSize: 8, color: "#5a6e83" }}>{d.subtype} | {d.powerKw} kW | {d.sessions || 0} sessions</div>
              </div>
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                <DataHealthBadge status={d.dataHealth} />
                <span style={S.badge(d.status)}>{d.status}</span>
                <button style={{ background: d.status === "charging" ? "rgba(255,59,92,0.1)" : "rgba(0,229,160,0.1)", border: `1px solid ${d.status === "charging" ? "#ff3b5c30" : "#00e5a030"}`, borderRadius: 3, color: d.status === "charging" ? "#ff3b5c" : "#00e5a0", fontSize: 8, padding: "2px 6px", cursor: "pointer", fontFamily: "inherit", fontWeight: 700 }}>{d.status === "charging" ? "CURTAIL" : "ENABLE"}</button>
              </div>
            </div>
          ))}
        </div>
        <div style={S.card}>
          <div style={S.glow("#ffb800")} /><div style={S.label}>Solar Assets</div>
          {solarAssets.map(d => (
            <div key={d.id} style={{ padding: "7px 0", borderBottom: "1px solid #111a2b", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#f0f4f8" }}>{d.name}</div>
                <div style={{ fontSize: 8, color: "#5a6e83" }}>{d.subtype} | {d.powerKw}/{d.maxKw} kW</div>
              </div>
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                <DataHealthBadge status={d.dataHealth} />
                <span style={S.badge(d.status)}>{d.status}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ ...S.card, marginTop: 12 }}>
        <div style={S.glow("#00e5a0")} /><div style={S.label}>Energy Balance</div>
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: mob ? 10 : 24, padding: "14px 0", flexWrap: "wrap" }}>
          {[
            { l: "Grid Load", v: totalLoad, c: "#f0f4f8" }, { l: "minus" },
            { l: "Solar", v: totalSolar, c: "#ffb800" }, { l: "plus" },
            { l: "EV", v: totalEv, c: "#007aff" }, { l: "equals" },
            { l: "Net", v: Math.round(netLoad), c: "#00e5a0" },
          ].map((k, i) => k.v !== undefined ? (
            <div key={i} style={{ textAlign: "center" }}>
              <div style={{ fontSize: 8, color: "#5a6e83" }}>{k.l}</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: k.c }}>{k.v}<span style={{ fontSize: 9, color: "#5a6e83" }}> kW</span></div>
            </div>
          ) : (
            <div key={i} style={{ fontSize: 16, color: "#3a5068" }}>{k.l === "minus" ? "−" : k.l === "plus" ? "+" : "="}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── ASSET ANALYTICS (Half-hourly profiles, Solar split, EV detection) ───
function AssetAnalytics({ asset, onBack, mob }) {
  // Generate 48 half-hourly data points (00:00 to 23:30)
  const timeLabels = useMemo(() => Array.from({ length: 48 }, (_, i) => {
    const h = Math.floor(i / 2);
    const m = i % 2 === 0 ? "00" : "30";
    return `${String(h).padStart(2, "0")}:${m}`;
  }), []);

  // Simulated consumption profile based on asset type
  const profile = useMemo(() => {
    const baseLoad = asset.capacityKva || asset.capacity || asset.maxKw || asset.count * 0.8 || 100;
    const consumption = timeLabels.map((_, i) => {
      const h = i / 2;
      // Realistic Indian load curve
      const nightBase = 0.25 + rand(0, 0.05);
      const morningPeak = h >= 7 && h <= 10 ? 0.7 + rand(0, 0.15) : 0;
      const afternoon = h >= 12 && h <= 16 ? 0.45 + rand(0, 0.1) : 0;
      const eveningPeak = h >= 18 && h <= 22 ? 0.85 + rand(0, 0.15) : 0;
      const mult = Math.max(nightBase, morningPeak, afternoon, eveningPeak);
      return Math.round(baseLoad * mult * rand(0.9, 1.1));
    });

    // Solar generation (only for homes/transformers/feeders)
    const hasSolar = asset.assetType !== "ev_charger" && asset.assetType !== "ev_park";
    const solarCap = hasSolar ? baseLoad * rand(0.15, 0.35) : 0;
    const solar = timeLabels.map((_, i) => {
      const h = i / 2;
      if (h < 6 || h > 18 || !hasSolar) return 0;
      return Math.round(solarCap * Math.sin(((h - 6) / 12) * Math.PI) * rand(0.7, 1.0));
    });

    // EV spikes — inject 2-3 random charging events
    const evSpikes = [];
    const evSpikeIndices = new Set();
    const numSpikes = Math.floor(rand(2, 5));
    for (let s = 0; s < numSpikes; s++) {
      const startIdx = Math.floor(rand(14, 44)); // mostly evening
      const duration = Math.floor(rand(2, 6)); // 1-3 hours
      const spikePower = Math.round(rand(15, 45));
      for (let d = 0; d < duration && startIdx + d < 48; d++) {
        consumption[startIdx + d] += spikePower;
        evSpikeIndices.add(startIdx + d);
        if (d === 0) evSpikes.push({ idx: startIdx, power: spikePower, time: timeLabels[startIdx], duration: duration * 0.5 });
      }
    }

    const netConsumption = consumption.map((c, i) => Math.max(0, c - solar[i]));
    const peakIdx = consumption.indexOf(Math.max(...consumption));
    const peakKva = Math.max(...consumption);
    const avgKva = Math.round(consumption.reduce((a, b) => a + b, 0) / 48);
    const totalSolar = solar.reduce((a, b) => a + b, 0);

    return { consumption, solar, netConsumption, evSpikes, evSpikeIndices, peakIdx, peakKva, avgKva, totalSolar, hasSolar };
  }, [asset.id]);

  const maxVal = Math.max(...profile.consumption, ...profile.solar);
  const chartW = mob ? 300 : 700;
  const chartH = 140;
  const barW = chartW / 48 * 0.7;
  const barGap = chartW / 48 * 0.3;

  return (
    <div>
      {/* Back button */}
      <button onClick={onBack} style={{ background: "none", border: "1px solid #1a2235", borderRadius: 4, color: "#5a6e83", fontSize: 9, padding: "4px 10px", cursor: "pointer", fontFamily: "inherit", marginBottom: 10, display: "flex", alignItems: "center", gap: 4 }}>
        ← Back to Map
      </button>

      {/* Asset Header */}
      <div style={S.card}>
        <div style={S.glow("#00e5a0")} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#f0f4f8" }}>{asset.name}</div>
            <div style={{ fontSize: 9, color: "#5a6e83", marginTop: 2 }}>{asset.id} • {asset.assetType} • {asset.lat?.toFixed(4)}, {asset.lng?.toFixed(4)}</div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <DataHealthBadge status={asset.dataHealth || "live"} />
          </div>
        </div>
      </div>

      {/* KPI Strip */}
      <div style={{ display: "grid", gridTemplateColumns: mob ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: 8, marginTop: 10 }}>
        {[
          { label: "Peak Demand", value: profile.peakKva, unit: "kVA", color: "#ff3b5c" },
          { label: "Avg Demand", value: profile.avgKva, unit: "kVA", color: "#00e5a0" },
          { label: "Solar Gen (day)", value: Math.round(profile.totalSolar / 2), unit: "kWh", color: "#ffb800" },
          { label: "EV Events Detected", value: profile.evSpikes.length, unit: "", color: "#007aff" },
        ].map((k, i) => (
          <div key={i} style={S.card}><div style={S.glow(k.color)} /><div style={S.label}>{k.label}</div><div style={{ ...S.bigNum, fontSize: 22 }}><span style={{ color: k.color }}>{k.value}</span><span style={S.unit}>{k.unit}</span></div></div>
        ))}
      </div>

      {/* Half-Hourly Consumption Chart */}
      <div style={{ ...S.card, marginTop: 10, overflowX: "auto" }}>
        <div style={S.glow("#00e5a0")} />
        <div style={S.label}>Half-Hourly Consumption Profile (kVA)</div>
        <div style={{ fontSize: 8, color: "#3a4a5e", marginBottom: 8, display: "flex", gap: 12 }}>
          <span style={{ display: "flex", alignItems: "center", gap: 3 }}><span style={{ width: 8, height: 8, background: "#1e3a5f", borderRadius: 1, display: "inline-block" }} /> Grid Consumption</span>
          {profile.hasSolar && <span style={{ display: "flex", alignItems: "center", gap: 3 }}><span style={{ width: 8, height: 8, background: "#ffb800", borderRadius: 1, display: "inline-block" }} /> Solar Generation</span>}
          <span style={{ display: "flex", alignItems: "center", gap: 3 }}><span style={{ width: 8, height: 8, background: "#ff3b5c", borderRadius: 1, display: "inline-block" }} /> EV Spike Detected</span>
        </div>
        <svg width={chartW} height={chartH + 30} style={{ display: "block" }}>
          {/* Grid lines */}
          {[0, 0.25, 0.5, 0.75, 1].map((f, i) => (
            <g key={i}>
              <line x1={0} y1={chartH * (1 - f)} x2={chartW} y2={chartH * (1 - f)} stroke="#131b2e" strokeWidth="0.5" />
              <text x={-2} y={chartH * (1 - f) + 3} textAnchor="end" fill="#3a4a5e" fontSize="6" fontFamily="inherit">{Math.round(maxVal * f)}</text>
            </g>
          ))}
          {/* Consumption bars */}
          {profile.consumption.map((v, i) => {
            const bh = (v / maxVal) * chartH;
            const x = i * (barW + barGap) + barGap / 2;
            const isEvSpike = profile.evSpikeIndices.has(i);
            const isPeak = i === profile.peakIdx;
            return (
              <g key={`c${i}`}>
                <rect x={x} y={chartH - bh} width={barW} height={bh} rx={1} fill={isEvSpike ? "#ff3b5c" : isPeak ? "#ff3b5c80" : "#1e3a5f"} />
                {i % 4 === 0 && <text x={x + barW / 2} y={chartH + 10} textAnchor="middle" fill="#3a4a5e" fontSize="5" fontFamily="inherit">{timeLabels[i]}</text>}
              </g>
            );
          })}
          {/* Solar overlay */}
          {profile.hasSolar && (() => {
            const pts = profile.solar.map((v, i) => {
              const x = i * (barW + barGap) + barGap / 2 + barW / 2;
              const y = chartH - (v / maxVal) * chartH;
              return `${x},${y}`;
            }).join(" ");
            const fillPts = `0,${chartH} ${pts} ${chartW},${chartH}`;
            return (
              <g>
                <polygon points={fillPts} fill="#ffb80015" />
                <polyline points={pts} fill="none" stroke="#ffb800" strokeWidth="1.5" strokeLinejoin="round" />
              </g>
            );
          })()}
          {/* EV spike markers */}
          {profile.evSpikes.map((sp, i) => {
            const x = sp.idx * (barW + barGap) + barGap / 2 + barW / 2;
            return (
              <g key={`ev${i}`}>
                <line x1={x} y1={0} x2={x} y2={chartH} stroke="#ff3b5c" strokeWidth="0.5" strokeDasharray="2 2" opacity="0.5" />
                <text x={x} y={chartH + 22} textAnchor="middle" fill="#ff3b5c" fontSize="5" fontWeight="700" fontFamily="inherit">EV?</text>
              </g>
            );
          })}
        </svg>
      </div>

      {/* Solar vs Consumption Breakdown (for assets with solar) */}
      {profile.hasSolar && (
        <div style={{ ...S.card, marginTop: 10 }}>
          <div style={S.glow("#ffb800")} />
          <div style={S.label}>Solar vs Grid Consumption Split</div>
          <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr 1fr", gap: 10, marginTop: 6 }}>
            {[
              { period: "Morning (6-12)", icon: "🌅" },
              { period: "Afternoon (12-18)", icon: "☀️" },
              { period: "Evening (18-24)", icon: "🌙" },
            ].map((p, pi) => {
              const startIdx = pi === 0 ? 12 : pi === 1 ? 24 : 36;
              const endIdx = startIdx + 12;
              const periodConsumption = profile.consumption.slice(startIdx, endIdx).reduce((a, b) => a + b, 0);
              const periodSolar = profile.solar.slice(startIdx, endIdx).reduce((a, b) => a + b, 0);
              const solarPct = periodConsumption > 0 ? Math.round((periodSolar / periodConsumption) * 100) : 0;
              const gridPct = 100 - solarPct;
              return (
                <div key={pi} style={{ background: "#111a2b", borderRadius: 6, padding: 10 }}>
                  <div style={{ fontSize: 9, color: "#5a6e83", marginBottom: 6 }}>{p.icon} {p.period}</div>
                  {/* Stacked bar */}
                  <div style={{ height: 6, borderRadius: 3, background: "#1a2235", overflow: "hidden", display: "flex", marginBottom: 6 }}>
                    <div style={{ width: `${solarPct}%`, background: "#ffb800", height: "100%" }} />
                    <div style={{ width: `${gridPct}%`, background: "#1e3a5f", height: "100%" }} />
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9 }}>
                    <span style={{ color: "#ffb800" }}>Solar {solarPct}%</span>
                    <span style={{ color: "#5a6e83" }}>Grid {gridPct}%</span>
                  </div>
                  <div style={{ fontSize: 8, color: "#3a4a5e", marginTop: 3 }}>{Math.round(periodConsumption / 2)} kWh total</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* EV Charging Detection */}
      {profile.evSpikes.length > 0 && (
        <div style={{ ...S.card, marginTop: 10, borderColor: "#ff3b5c30" }}>
          <div style={S.glow("#ff3b5c")} />
          <div style={S.label}>⚡ Potential EV Charging Events Detected</div>
          <div style={{ fontSize: 9, color: "#5a6e83", marginBottom: 8 }}>Sudden consumption spikes inconsistent with normal load pattern — possible unregistered EV charging</div>
          {profile.evSpikes.map((sp, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 8px", background: "rgba(255,59,92,0.05)", borderLeft: "3px solid #ff3b5c", borderRadius: "0 4px 4px 0", marginBottom: 4 }}>
              <div style={{ fontSize: 16 }}>⚡</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 10, color: "#f0f4f8", fontWeight: 600 }}>Spike at {sp.time} — +{sp.power} kVA for ~{sp.duration}h</div>
                <div style={{ fontSize: 8, color: "#5a6e83", marginTop: 1 }}>Pattern matches Level 2 EV charger ({sp.power > 30 ? "7-11 kW" : "3-7 kW"} range)</div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <span style={{ fontSize: 14, fontWeight: 800, color: "#ff3b5c" }}>{Math.round(70 + rand(0, 25))}%</span>
                <span style={{ fontSize: 7, color: "#5a6e83" }}>confidence</span>
              </div>
            </div>
          ))}
          <div style={{ marginTop: 8, padding: "5px 7px", background: "#111a2b", borderRadius: 3, fontSize: 8, color: "#5a6e83" }}>
            🧠 AI Recommendation: Register EV load at this asset to enable demand response. Unregistered EV charging contributes to transformer overloading and loss estimation errors.
          </div>
        </div>
      )}

      {/* Net Demand Profile */}
      <div style={{ ...S.card, marginTop: 10 }}>
        <div style={S.glow("#007aff")} />
        <div style={S.label}>Net Demand (Consumption − Solar)</div>
        <div style={{ overflowX: "auto" }}>
          <svg width={chartW} height={60} style={{ display: "block" }}>
            {(() => {
              const mx = Math.max(...profile.netConsumption);
              const pts = profile.netConsumption.map((v, i) => {
                const x = i * (barW + barGap) + barGap / 2 + barW / 2;
                const y = 55 - (v / mx) * 50;
                return `${x},${y}`;
              }).join(" ");
              const fillPts = `0,55 ${pts} ${chartW},55`;
              return (
                <g>
                  <polygon points={fillPts} fill="rgba(0,122,255,0.1)" />
                  <polyline points={pts} fill="none" stroke="#007aff" strokeWidth="1.5" strokeLinejoin="round" />
                </g>
              );
            })()}
            {[0, 12, 24, 36, 47].map(i => (
              <text key={i} x={i * (barW + barGap) + barGap / 2 + barW / 2} y={58} textAnchor="middle" fill="#3a4a5e" fontSize="5" fontFamily="inherit">{timeLabels[i]}</text>
            ))}
          </svg>
        </div>
      </div>
    </div>
  );
}

              <div style={{ display: "flex", gap: 3, flexWrap: "wrap", marginBottom: 8 }}>
                {dev.assetTags.map(tag => (
                  <span key={tag} style={{ fontSize: 7, padding: "1px 5px", borderRadius: 3, background: `${tagColors[tag] || S.t.textDim}15`, color: tagColors[tag] || S.t.textDim, border: `1px solid ${tagColors[tag] || S.t.textDim}30`, fontWeight: 600, textTransform: "uppercase" }}>
                    {tagLabels[tag] || tag}
                  </span>
                ))}
              </div>

              {/* Specs */}
              <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 3, marginBottom: 10 }}>
                {[
                  { label: "Protocol", value: dev.protocol },
                  { label: "Comms", value: dev.communication },
                  { label: "Accuracy", value: dev.accuracy },
                ].map((sp, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 8 }}>
                    <span style={{ color: S.t.textDim }}>{sp.label}</span>
                    <span style={{ color: S.t.text, fontWeight: 600, textAlign: "right", maxWidth: "60%" }}>{sp.value}</span>
                  </div>
                ))}
                <div style={{ fontSize: 8, color: S.t.textMuted, marginTop: 2, lineHeight: 1.4 }}>{dev.features}</div>
              </div>

              {/* Price + CTA */}
              <div style={{ borderTop: `1px solid ${S.t.border}`, paddingTop: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 16, fontWeight: 800, color: S.t.green }}>₹{dev.price.toLocaleString("en-IN")}</div>
                  <div style={{ fontSize: 7, color: S.t.textMuted }}>excl. GST</div>
                </div>
                <button
                  onClick={() => handleRequest(dev.id)}
                  style={{
                    padding: "6px 12px", fontSize: 9, fontWeight: 700, borderRadius: 5, cursor: "pointer", fontFamily: "inherit",
                    background: requested ? `${S.t.green}20` : `${S.t.blue}18`,
                    border: `1px solid ${requested ? S.t.green + "40" : S.t.blue + "40"}`,
                    color: requested ? S.t.green : S.t.blue,
                    letterSpacing: 0.3,
                  }}
                >
                  {requested ? "✓ REQUESTED" : "REQUEST SUPPLIER INFO"}
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {filtered.length === 0 && (
        <div style={{ textAlign: "center", padding: "40px 0", color: S.t.textMuted, fontSize: 11 }}>
          No devices found matching your filters
        </div>
      )}
    </div>
  );
}
