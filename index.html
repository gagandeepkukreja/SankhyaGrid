function useIsMobile(breakpoint = 768) {
  const [isMobile, setIsMobile] = useState(window.innerWidth < breakpoint);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < breakpoint);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, [breakpoint]);
  return isMobile;
}

// ─── GENERATION DATA SIMULATOR ─────────────────────────────────────────────
function generateGenData(hour) {
  const isDaytime = hour >= 6 && hour <= 18;
  const solarMult = isDaytime ? Math.sin(((hour-6)/12)*Math.PI)*rand(0.70,0.97) : 0;
  const irr = Math.round(solarMult*1000);
  const temp = 28 + hour*0.8 + rand(-2,4);
  const isPeak = hour >= 18 && hour <= 22;

  const parks = SOLAR_PARKS.map(p => {
    const pr = +(rand(0.76,0.92)).toFixed(3); // performance ratio
    const genKw = Math.round(p.capacityMwp * 1000 * solarMult * pr * rand(0.92,1.02));
    const p50Kw = Math.round(p.capacityMwp * 1000 * solarMult * 0.84);
    const cuf = +(genKw / (p.capacityMwp * 1000) * 100).toFixed(1);
    const exportKwh = Math.round(genKw * 0.495); // half-hourly kWh
    const revenue = +(exportKwh * p.ppaRate / 1000).toFixed(2);
    const curtailed = Math.random() > 0.85 ? Math.round(rand(20,120)) : 0;
    const stringsOnline = p.strings - (Math.random() > 0.9 ? Math.floor(rand(1,4)) : 0);
    const inverterTemp = Math.round(35 + solarMult*25 + rand(-3,5));
    const dcVoltage = Math.round(650 + solarMult*120 + rand(-20,20));
    const acFreq = +(50 + rand(-0.05,0.05)).toFixed(2);
    const health = curtailed > 80 ? "curtailed" : stringsOnline < p.strings ? "degraded" : genKw > 0 ? "generating" : "offline";
    const scheduledKw = Math.round(p.capacityMwp*1000*solarMult*0.88);
    const deviation = genKw - scheduledKw;
    const uiCharge = Math.abs(deviation) > 100 ? +(Math.abs(deviation) * 0.000050 * rand(1,3)).toFixed(2) : 0;
    return { ...p, genKw, p50Kw, cuf, pr, exportKwh, revenue, curtailed, stringsOnline, inverterTemp, dcVoltage, acFreq, health, scheduledKw, deviation, uiCharge, irr, ambientTemp: Math.round(temp), dataHealth: Math.random()>0.08?"live":"stale" };
  });

  const bess = BESS_UNITS.map(b => {
    const soc = Math.round(rand(20,95));
    const isCharging = !isPeak && solarMult > 0.3 && soc < 85;
    const isDischarging = (isPeak || solarMult < 0.1) && soc > 20;
    const powerKw = isDischarging ? Math.round(b.powerMw*1000*rand(0.6,1.0)) : isCharging ? -Math.round(b.powerMw*1000*rand(0.4,0.9)) : 0;
    const mode = isDischarging ? "discharging" : isCharging ? "charging" : "standby";
    const iexPrice = IEX_PRICES[hour]?.price || 3.0;
    const arbitrageScore = isPeak && soc > 40 ? Math.round(rand(70,95)) : Math.round(rand(20,45));
    const rte = +(rand(0.89,0.94)).toFixed(3);
    const cellTemp = Math.round(25 + Math.abs(powerKw)/b.powerMw/1000*15 + rand(-2,4));
    const stateOfHealth = +(100 - (b.cycles/b.designLife)*rand(8,15)).toFixed(1);
    const estimatedRevenue = mode === "discharging" ? +(powerKw * iexPrice / 1000 * 0.5).toFixed(2) : 0;
    return { ...b, soc, powerKw, mode, arbitrageScore, rte, cellTemp, stateOfHealth, iexPrice, estimatedRevenue, dataHealth: Math.random()>0.05?"live":"stale" };
  });

  const totalSolarGen = parks.reduce((s,p)=>s+p.genKw,0);
  const totalBessPower = bess.reduce((s,b)=>s+b.powerKw,0);
  const totalCurtailed = parks.reduce((s,p)=>s+p.curtailed,0);
  const totalRevenue = parks.reduce((s,p)=>s+p.revenue,0);
  const avgPR = parks.length ? +(parks.reduce((s,p)=>s+p.pr,0)/parks.length).toFixed(3) : 0;
  const avgCUF = parks.length ? +(parks.reduce((s,p)=>s+p.cuf,0)/parks.length).toFixed(1) : 0;

  return { parks, bess, totalSolarGen, totalBessPower, totalCurtailed, totalRevenue, avgPR, avgCUF, irr, hour };
}

function Sparkline({data,color="#00e5a0",w=80,h=24}){if(!data||data.length<2)return null;const mn=Math.min(...data),mx=Math.max(...data),r=mx-mn||1;const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/r)*h}`).join(" ");return <svg width={w} height={h} style={{display:"block"}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/></svg>;}
function MiniBarChart({data,labels,color,w=240,h=90}){const t=S.t;const mx=Math.max(...data);const bw=(w/data.length)*0.6;const gap=(w/data.length)*0.4;return(<svg width={w} height={h+20} style={{display:"block"}}>{data.map((v,i)=>{const bh=(v/mx)*h;const x=i*(bw+gap)+gap/2;return(<g key={i}><rect x={x} y={h-bh} width={bw} height={bh} rx={3} fill={v===mx?t.red:(color||t.blue)} opacity={0.85}/><text x={x+bw/2} y={h+14} textAnchor="middle" fill={t.textDim} fontSize="9" fontFamily="inherit">{labels?.[i]||i}</text><text x={x+bw/2} y={h-bh-4} textAnchor="middle" fill={t.textBright} fontSize="9" fontFamily="inherit" fontWeight="600">{v}</text></g>);})}</svg>);}
function useHistory(items,key,maxLen=30){const ref=useRef({});useEffect(()=>{items.forEach(f=>{if(!ref.current[f.id])ref.current[f.id]=[];ref.current[f.id].push(f[key]);if(ref.current[f.id].length>maxLen)ref.current[f.id].shift();});},[items]);return ref.current;}

function generateLiveData(hour){
  const isDaytime=hour>=6&&hour<=18;
  const isPeak=(hour>=18&&hour<=22)||(hour>=7&&hour<=10);
  const loadMult=isPeak?rand(0.75,0.95):rand(0.35,0.65);
  const solarMult=isDaytime?Math.sin(((hour-6)/12)*Math.PI)*rand(0.6,0.95):0;
  const feeders=FEEDERS.map(f=>{const loadKw=f.capacity*loadMult*rand(0.85,1.15);const inputE=loadKw*rand(1.0,1.05);const outputE=loadKw*rand(0.78,0.96);return{...f,loadKw:Math.round(loadKw),loadPct:Math.round((loadKw/f.capacity)*100),voltage:+(11*rand(0.94,1.06)).toFixed(2),current:+(loadKw/(11*1.732*rand(0.85,0.95))).toFixed(1),pf:+rand(0.82,0.98).toFixed(2),inputEnergy:Math.round(inputE),outputEnergy:Math.round(outputE),lossPct:+((1-outputE/inputE)*100).toFixed(1),dataHealth:Math.random()>0.15?"live":"stale"};});
  const transformers=TRANSFORMERS.map(t=>{const tLoadMult=loadMult*rand(0.7,1.3);const loadKva=t.capacityKva*clamp(tLoadMult,0.2,1.15);const loadPct=(loadKva/t.capacityKva)*100;const temp=35+loadPct*rand(0.3,0.5);let health="healthy";if(loadPct>100)health="critical";else if(loadPct>85)health="warning";else if(temp>70)health="warning";return{...t,loadKva:Math.round(loadKva),loadPct:Math.round(loadPct),voltage:+(0.415*rand(0.92,1.08)).toFixed(3),temperature:Math.round(temp),health,dataHealth:Math.random()>0.1?"live":"stale"};});
  const ders=DER_ASSETS.map(d=>{if(d.type==="ev"){const active=Math.random()>0.3;const sessions=active?Math.floor(rand(1,d.maxKw/7)):0;const powerKw=active?Math.round(sessions*rand(5,11)):0;return{...d,status:active?"charging":"idle",powerKw,sessions,dataHealth:Math.random()>0.12?"live":"stale"};}else{const gen=Math.round(d.maxKw*solarMult*rand(0.7,1.0));return{...d,status:gen>0?"generating":"offline",powerKw:gen,irradiance:Math.round(solarMult*1000),dataHealth:Math.random()>0.1?"live":"stale"};}});
  const homes=HOMES.map(h=>({...h,demandKw:Math.round(h.count*rand(0.3,1.2)),avgVoltage:+(230*rand(0.92,1.08)).toFixed(0),dataHealth:Math.random()>0.2?"live":"stale"}));
  const industries=INDUSTRIES.map(ind=>{const indLoadMult=isPeak?rand(0.7,0.95):rand(0.5,0.85);const demandKw=Math.round(ind.contractDemand*indLoadMult);const solarGen=Math.round(ind.solarCapacity*solarMult*rand(0.6,0.95));const pf=+rand(0.88,0.98).toFixed(2);return{...ind,demandKw,solarGen,netDemand:demandKw-solarGen,loadPct:Math.round((demandKw/ind.contractDemand)*100),pf,voltage:+(33*rand(0.96,1.04)).toFixed(1),dataHealth:Math.random()>0.08?"live":"stale"};});
  return{feeders,transformers,ders,homes,industries,timestamp:new Date()};
}
function generateAlerts(data){
  const alerts=[];const now=new Date();
  data.transformers.forEach(t=>{if(t.loadPct>100)alerts.push({id:`AL-${t.id}-OL`,severity:"critical",message:`${t.name} OVERLOADED at ${t.loadPct}%`,asset:t.id,time:new Date(now-rand(0,300000)),type:"overload"});else if(t.loadPct>85)alerts.push({id:`AL-${t.id}-HI`,severity:"warning",message:`${t.name} high load: ${t.loadPct}%`,asset:t.id,time:new Date(now-rand(0,600000)),type:"overload"});if(t.temperature>70)alerts.push({id:`AL-${t.id}-TMP`,severity:"warning",message:`${t.name} temp: ${t.temperature}°C`,asset:t.id,time:new Date(now-rand(0,400000)),type:"thermal"});});
  data.feeders.forEach(f=>{if(f.voltage<10.5||f.voltage>11.5)alerts.push({id:`AL-${f.id}-V`,severity:"warning",message:`${f.name} voltage: ${f.voltage} kV`,asset:f.id,time:new Date(now-rand(0,500000)),type:"voltage"});if(f.lossPct>18)alerts.push({id:`AL-${f.id}-LOSS`,severity:"critical",message:`${f.name} losses at ${f.lossPct}% — possible theft zone`,asset:f.id,time:new Date(now-rand(0,200000)),type:"theft"});if(f.loadPct>90)alerts.push({id:`AL-${f.id}-PK`,severity:"critical",message:`${f.name} at ${f.loadPct}% capacity`,asset:f.id,time:new Date(now-rand(0,100000)),type:"overload"});});
  const peakT=data.transformers.reduce((a,b)=>a.loadPct>b.loadPct?a:b);
  if(peakT.loadPct>70)alerts.push({id:"AI-PRED-1",severity:"insight",message:`${peakT.name} predicted to overload by 7:30 PM — consider load shifting`,asset:peakT.id,time:now,type:"prediction"});
  const highLossF=data.feeders.reduce((a,b)=>a.lossPct>b.lossPct?a:b);
  if(highLossF.lossPct>12)alerts.push({id:"AI-LOSS-1",severity:"insight",message:`${highLossF.name} losses at ${highLossF.lossPct}% — investigate section 3-4 for theft`,asset:highLossF.id,time:now,type:"theft"});
  const totalEv=data.ders.filter(d=>d.type==="ev").reduce((s,d)=>s+d.powerKw,0);
  if(totalEv>80)alerts.push({id:"AI-EV-1",severity:"insight",message:`EV load at ${totalEv} kW — shift ${Math.round(totalEv*0.4)} kW to off-peak`,asset:"EV",time:now,type:"ev_load"});
  alerts.push({id:"AI-WX-1",severity:"insight",message:`High temperature forecast (42°C) — transformer cooling reduced, pre-position load shedding`,asset:"WEATHER",time:now,type:"weather"});
  return alerts.sort((a,b)=>b.time-a.time);
}

  const totalMwh = +(bess.reduce((s,b)=>s+b.capacityMwh,0)).toFixed(1);
  const totalMw = +(bess.reduce((s,b)=>s+b.powerMw,0)).toFixed(1);
  const totalPower = bess.reduce((s,b)=>s+b.powerKw,0);
  const avgSoc = Math.round(bess.reduce((s,b)=>s+b.soc,0)/bess.length);
  const estDailyRevenue = Math.round(bess.reduce((s,b)=>s+b.estimatedRevenue*48,0));
  const discharging = bess.filter(b=>b.mode==="discharging").length;

  // Simulated 24h SOC history
  const socHistory = useMemo(()=>Array.from({length:24},(_,h)=>{
    const base=55; const morning=h>=7&&h<=10?15:0; const peak=h>=18&&h<=22?-25:0; const solar=h>=9&&h<=15?10:0;
    return Math.max(15,Math.min(98,Math.round(base+morning+peak+solar+rand(-5,5))));
  }),[]);

  const ModeColor = { charging: t.green, discharging: t.yellow, standby: t.textMuted };

  return (
    <div>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(5,1fr)",gap:8,marginBottom:12}}>
        {[
          {l:"Total BESS Capacity",v:`${totalMwh} MWh`,c:"#22d3ee"},
          {l:"Total Power",v:`${totalMw} MW`,c:t.blue},
          {l:"Avg State of Charge",v:`${avgSoc}%`,c:avgSoc<20?t.red:avgSoc>85?t.yellow:t.green},
          {l:"Net BESS Power",v:`${totalPower>0?"+":""}${totalPower} kW`,c:totalPower>0?t.yellow:totalPower<0?t.green:t.textMuted},
          {l:"Est. Daily Revenue",v:`₹${estDailyRevenue.toLocaleString("en-IN")}`,c:t.green},
        ].map((k,i)=>(
          <div key={i} style={S.card}><div style={S.glow(k.c)}/><div style={{...S.label,paddingLeft:8}}>{k.l}</div><div style={{fontSize:18,fontWeight:700,color:k.c,paddingLeft:8}}>{k.v}</div></div>
        ))}
      </div>

      {/* BESS Unit Cards */}
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(3,1fr)",gap:10,marginBottom:12}}>
        {bess.map(b=>{
          const mc = ModeColor[b.mode]||t.textMuted;
          const isSelected = selectedBess?.id===b.id;
          return (
            <div key={b.id} onClick={()=>setSelectedBess(isSelected?null:b)} style={{...S.card,cursor:"pointer",border:`1px solid ${isSelected?"#22d3ee":t.border}`,transition:"all 0.2s"}}>
              <div style={S.glow("#22d3ee")}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",paddingLeft:8,marginBottom:10}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:t.textBright}}>{b.name}</div>
                  <div style={{fontSize:9,color:t.textDim,marginTop:1}}>{b.location} • {b.chemistry} • {b.make}</div>
                  <div style={{fontSize:9,color:t.textDim,marginTop:1}}>{b.capacityMwh} MWh / {b.powerMw} MW</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                  <span style={{fontSize:9,padding:"2px 8px",borderRadius:3,background:`${mc}15`,color:mc,border:`1px solid ${mc}30`,fontWeight:700,textTransform:"uppercase"}}>{b.mode}</span>
                  <DataHealthBadge status={b.dataHealth}/>
                </div>
              </div>

              {/* SOC Gauge */}
              <div style={{paddingLeft:8,paddingRight:8,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:8,marginBottom:4}}>
                  <span style={{color:t.textDim}}>State of Charge</span>
                  <span style={{fontWeight:700,fontSize:16,color:b.soc<20?t.red:b.soc>85?t.yellow:t.green}}>{b.soc}%</span>
                </div>
                <div style={{height:10,background:t.barBg,borderRadius:5,overflow:"hidden",position:"relative"}}>
                  <div style={{height:"100%",width:`${b.soc}%`,background:`linear-gradient(90deg,${t.green},${b.soc>75?t.yellow:t.green})`,borderRadius:5,transition:"width 1s"}}/>
                  {/* Tick marks */}
                  {[20,50,80].map(tick=>(
                    <div key={tick} style={{position:"absolute",top:0,left:`${tick}%`,width:1,height:"100%",background:"rgba(0,0,0,0.2)"}}/>
                  ))}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:6,color:t.textFaint,marginTop:2}}>
                  <span>Empty</span><span>20%</span><span>50%</span><span>80%</span><span>Full</span>
                </div>
              </div>

              {/* Metrics Grid */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4,paddingLeft:8,marginBottom:8}}>
                {[
                  {l:"Power",v:`${b.powerKw>0?"+":""}${b.powerKw} kW`,c:b.mode==="discharging"?t.yellow:b.mode==="charging"?t.green:t.textMuted},
                  {l:"Cell Temp",v:`${b.cellTemp}°C`,c:b.cellTemp>45?t.red:t.text},
                  {l:"RTE",v:`${(b.rte*100).toFixed(1)}%`,c:t.blue},
                  {l:"SOH",v:`${b.stateOfHealth}%`,c:b.stateOfHealth<85?t.red:t.green},
                  {l:"Cycles",v:`${b.cycles}`,c:t.text},
                  {l:"IEX Now",v:`₹${b.iexPrice}/kWh`,c:t.blue},
                ].map((m,i)=>(
                  <div key={i} style={{background:t.bgInner,borderRadius:4,padding:"4px 6px"}}>
                    <div style={{fontSize:7,color:t.textDim}}>{m.l}</div>
                    <div style={{fontSize:10,fontWeight:700,color:m.c}}>{m.v}</div>
                  </div>
                ))}
              </div>

              {/* Arbitrage Score */}
              <div style={{paddingLeft:8,paddingRight:8,marginBottom:6}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:8,marginBottom:3}}>
                  <span style={{color:t.textDim}}>Arbitrage Opportunity Score</span>
                  <span style={{fontWeight:700,color:b.arbitrageScore>65?t.green:b.arbitrageScore>40?t.yellow:t.textDim}}>{b.arbitrageScore}/100</span>
                </div>
                <div style={{height:4,background:t.barBg,borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${b.arbitrageScore}%`,background:b.arbitrageScore>65?t.green:b.arbitrageScore>40?t.yellow:t.textDim,borderRadius:2}}/>
                </div>
              </div>

              {/* Project + warranty */}
              <div style={{paddingLeft:8,display:"flex",gap:8,flexWrap:"wrap",fontSize:8}}>
                <span style={{color:t.textDim}}>Project: <span style={{color:t.text}}>{b.project}</span></span>
                <span style={{color:t.textDim}}>Warranty: <span style={{color:t.text}}>{b.warrantyExpiry}</span></span>
              </div>
              {b.estimatedRevenue>0&&(
                <div style={{marginLeft:8,marginTop:6,padding:"3px 6px",background:`${t.green}08`,border:`1px solid ${t.green}20`,borderRadius:3,fontSize:8,color:t.green}}>
                  Est. revenue this block: ₹{b.estimatedRevenue}
                </div>
              )}

              {/* Dispatch Buttons */}
              <div style={{display:"flex",gap:6,marginTop:8,paddingLeft:8}}>
                {["CHARGE","DISCHARGE","STANDBY"].map(cmd=>(
                  <button key={cmd} style={{flex:1,padding:"5px 0",fontSize:8,fontWeight:700,borderRadius:4,cursor:"pointer",fontFamily:"inherit",
                    background:cmd==="CHARGE"?`${t.green}15`:cmd==="DISCHARGE"?`${t.yellow}15`:`${t.textMuted}10`,
                    border:`1px solid ${cmd==="CHARGE"?t.green:cmd==="DISCHARGE"?t.yellow:t.border}30`,
                    color:cmd==="CHARGE"?t.green:cmd==="DISCHARGE"?t.yellow:t.textDim}}>{cmd}</button>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* SOC Profile */}
      <div style={S.card}>
        <div style={S.glow(t.green)}/>
        <div style={{...S.label,paddingLeft:8}}>Typical BESS SOC Profile (24h) — Charge on Solar, Discharge at Peak</div>
        <svg width="100%" viewBox="0 0 700 120" style={{display:"block",marginTop:8}}>
          {[20,50,80].map(v=>(
            <g key={v}>
              <line x1={40} y1={100-(v/100)*90} x2={690} y2={100-(v/100)*90} stroke={t.gridLine} strokeWidth={0.5} strokeDasharray="3 3"/>
              <text x={35} y={104-(v/100)*90} textAnchor="end" fill={t.textDim} fontSize={7} fontFamily="inherit">{v}%</text>
            </g>
          ))}
          {/* Fill area */}
          {(() => {
            const pts = socHistory.map((v,i)=>`${40+i*(650/23)},${100-(v/100)*90}`).join(" ");
            const fill = `40,100 ${pts} ${690},100`;
            return (<g><polygon points={fill} fill={`${t.green}15`}/><polyline points={pts} fill="none" stroke={t.green} strokeWidth={2} strokeLinejoin="round"/></g>);
          })()}
          {[0,6,12,18,23].map(h=>(
            <text key={h} x={40+h*(650/23)} y={115} textAnchor="middle" fill={t.textDim} fontSize={7} fontFamily="inherit">{h}:00</text>
          ))}
          {/* Annotations */}
          <rect x={40+9*(650/23)} y={5} width={4*(650/23)} height={95} fill={`${t.green}08`}/>
          <text x={40+11*(650/23)} y={18} textAnchor="middle" fill={t.green} fontSize={7} fontFamily="inherit">Solar Charge</text>
          <rect x={40+18*(650/23)} y={5} width={4*(650/23)} height={95} fill={`${t.red}08`}/>
          <text x={40+20*(650/23)} y={18} textAnchor="middle" fill={t.red} fontSize={7} fontFamily="inherit">Peak Discharge</text>
        </svg>
      </div>

      {/* BESS vs IEX Opportunity */}
      <div style={{...S.card,marginTop:10}}>
        <div style={S.glow(t.yellow)}/>
        <div style={{...S.label,paddingLeft:8}}>Grid Services Capability</div>
        <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:8,paddingLeft:0}}>
          {[
            {l:"Primary Frequency Regulation",v:"Ready",sub:"< 30ms response",c:t.green,icon:"⚡"},
            {l:"Peak Shaving",v:"Active",sub:`${discharging}/${bess.length} units discharging`,c:t.yellow,icon:"📉"},
            {l:"Solar Firming",v:"Enabled",sub:"Smoothing ramp events",c:t.blue,icon:"☀"},
            {l:"Voltage Support",v:"Standby",sub:"Q-absorption mode ready",c:t.textDim,icon:"🔄"},
          ].map((k,i)=>(
            <div key={i} style={{background:t.bgInner,borderRadius:5,padding:"10px 12px",border:`1px solid ${k.c}20`}}>

              <div style={{fontSize:9,color:t.textDim,marginBottom:3}}>{k.l}</div>
              <div style={{fontSize:12,fontWeight:700,color:k.c,marginBottom:2}}>{k.v}</div>
              <div style={{fontSize:8,color:t.textFaint}}>{k.sub}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── RPO COMPLIANCE VIEW ──────────────────────────────────────────────────
function RPOView({ mob }) {
  const t = S.t;
  const rpo = RPO_OBLIGATIONS[0];

  const segments = [
    {l:"Solar RPO",obl:rpo.solarObligation,ach:rpo.solarAchieved,c:t.yellow,icon:"☀"},
    {l:"Non-Solar RPO",obl:rpo.nonSolarObligation,ach:rpo.nonSolarAchieved,c:t.green,icon:"🌿"},
    {l:"Wind RPO",obl:rpo.windObligation,ach:rpo.windAchieved,c:t.blue,icon:"💨"},
  ];

  const rcsPct = Math.round(rpo.rcsPurchased/rpo.rcsRequired*100);

  // Simulated monthly RPO data
  const months = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];

  return (
    <div>
      {/* Header */}
      <div style={{...S.card,marginBottom:12,borderColor:`${t.yellow}30`}}>
        <div style={S.glow(t.yellow)}/>
        <div style={{paddingLeft:8}}>
          <div style={{fontSize:14,fontWeight:700,color:t.textBright,marginBottom:4}}>RPO / RCO Compliance Dashboard</div>
          <div style={{fontSize:10,color:t.textDim}}>Chhattisgarh — FY {rpo.fy} | Obligation under Electricity Act 2003 §86(1)(e) & SERC RPO Regulations</div>
          <div style={{marginTop:6,display:"flex",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:8,padding:"2px 8px",background:`${t.yellow}15`,border:`1px solid ${t.yellow}30`,borderRadius:3,color:t.yellow,fontWeight:700}}>ELECTRICITY AMENDMENT ACT 2023 ALIGNED</span>
            <span style={{fontSize:8,padding:"2px 8px",background:`${t.red}15`,border:`1px solid ${t.red}30`,borderRadius:3,color:t.red,fontWeight:700}}>PENALTY RISK: ₹{rpo.penalty.toLocaleString("en-IN")}</span>
          </div>
        </div>
      </div>

      {/* RPO Meters */}
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(3,1fr)",gap:10,marginBottom:12}}>
        {segments.map((seg,i)=>{
          const pct = Math.round(seg.ach/seg.obl*100);
          const gap = +(seg.obl-seg.ach).toFixed(1);
          const status = pct>=100?"achieved":pct>=80?"on-track":"at-risk";
          const sc = status==="achieved"?t.green:status==="on-track"?t.yellow:t.red;
          return (
            <div key={i} style={{...S.card,border:`1px solid ${sc}20`}}>
              <div style={S.glow(sc)}/>
              <div style={{paddingLeft:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:t.textBright}}>{seg.icon} {seg.l}</div>
                  <span style={{...S.badge(status==="achieved"?"healthy":status==="on-track"?"warning":"critical")}}>{status}</span>
                </div>
                {/* Big percentage */}
                <div style={{textAlign:"center",padding:"12px 0"}}>
                  <div style={{fontSize:36,fontWeight:800,color:sc,lineHeight:1}}>{pct}%</div>
                  <div style={{fontSize:9,color:t.textDim,marginTop:4}}>of FY obligation achieved</div>
                </div>
                {/* Progress arc approximation via bar */}
                <div style={{height:8,background:t.barBg,borderRadius:4,overflow:"hidden",marginBottom:8}}>
                  <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:sc,borderRadius:4}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                  {[
                    {l:"Obligation",v:`${seg.obl}%`},{l:"Achieved",v:`${seg.ach}%`,c:sc},
                    {l:"Gap",v:`${gap > 0 ? gap+"%" : "Met"}`,c:gap>0?t.red:t.green},{l:"FY",v:rpo.fy},
                  ].map((m,j)=>(
                    <div key={j} style={{fontSize:9}}><span style={{color:t.textDim}}>{m.l}: </span><span style={{fontWeight:600,color:m.c||t.text}}>{m.v}</span></div>
                  ))}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* RCS / REC Tracking */}
      <div style={{...S.card,marginBottom:12}}>
        <div style={S.glow(t.green)}/>
        <div style={{...S.label,paddingLeft:8}}>Renewable Energy Certificates (REC / RCS)</div>
        <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(4,1fr)",gap:8,paddingLeft:0,marginBottom:10}}>
          {[
            {l:"RCS Required",v:rpo.rcsRequired.toLocaleString("en-IN"),c:t.textBright},
            {l:"RCS Purchased",v:rpo.rcsPurchased.toLocaleString("en-IN"),c:t.green},
            {l:"Gap",v:rcsGap.toLocaleString("en-IN"),c:t.red},
            {l:"Coverage",v:`${rcsPct}%`,c:rcsPct>=100?t.green:rcsPct>=80?t.yellow:t.red},
          ].map((k,i)=>(
            <div key={i} style={{background:t.bgInner,borderRadius:5,padding:"8px 10px"}}>
              <div style={{fontSize:8,color:t.textDim,marginBottom:3}}>{k.l}</div>
              <div style={{fontSize:16,fontWeight:700,color:k.c}}>{k.v}</div>
            </div>
          ))}
        </div>
        <div style={{paddingLeft:8}}>
          <div style={{height:8,background:t.barBg,borderRadius:4,overflow:"hidden",marginBottom:4}}>
            <div style={{height:"100%",width:`${rcsPct}%`,background:rcsPct>=100?t.green:rcsPct>=80?t.yellow:t.red,borderRadius:4}}/>
          </div>
          <div style={{fontSize:8,color:t.textDim}}>IEX-REC Platform: {rcsGap} RCS certificates to be purchased before March 31. Est. cost at ₹1.50/unit: <span style={{color:t.red,fontWeight:700}}>₹{(rcsGap*1.5).toLocaleString("en-IN")}</span></div>
        </div>
      </div>

      {/* Monthly Progress Chart */}
      <div style={S.card}>
        <div style={S.glow(t.yellow)}/>
        <div style={{...S.label,paddingLeft:8}}>Monthly Solar RPO Achievement — FY {rpo.fy}</div>
        <svg width="100%" viewBox="0 0 700 130" style={{display:"block",marginTop:8}}>
          {[1,2,3,4].map(v=>(
            <g key={v}>
              <line x1={40} y1={110-v*22} x2={690} y2={110-v*22} stroke={t.gridLine} strokeWidth={0.5}/>
              <text x={35} y={114-v*22} textAnchor="end" fill={t.textDim} fontSize={7} fontFamily="inherit">{v*2}%</text>
            </g>
          ))}
          {/* Obligation line */}
          <line x1={40} y1={110-(rpo.solarObligation/8)*88} x2={690} y2={110-(rpo.solarObligation/8)*88} stroke={t.red} strokeWidth={1.5} strokeDasharray="5 3"/>
          <text x={695} y={113-(rpo.solarObligation/8)*88} fill={t.red} fontSize={7} fontFamily="inherit">Target</text>
          {/* Bars */}
          {monthlyAch.map((v,i)=>{
            const bh=(v/8)*88; const bw=44;
            const x=40+i*bw; const met=v>=rpo.solarObligation;
            return (
              <g key={i}>
                <rect x={x+2} y={110-bh} width={bw-4} height={bh} rx={3} fill={met?`${t.green}aa`:`${t.yellow}aa`}/>
                <text x={x+bw/2} y={126} textAnchor="middle" fill={t.textDim} fontSize={7} fontFamily="inherit">{months[i]}</text>
                <text x={x+bw/2} y={105-bh} textAnchor="middle" fill={t.textBright} fontSize={6} fontFamily="inherit">{v}%</text>
              </g>
            );
          })}
        </svg>
        <div style={{display:"flex",gap:12,paddingLeft:8,marginTop:4}}>
          {[{c:t.green,l:"RPO Met"},{c:t.yellow,l:"RPO Not Met"},{c:t.red,l:"Obligation Target (dashed)"}].map((v,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:8,color:t.textDim}}><div style={{width:8,height:8,background:v.c,borderRadius:1}}/>{v.l}</div>
          ))}
        </div>
      </div>

      {/* Penalty Calculator */}
      <div style={{...S.card,marginTop:10,borderColor:`${t.red}20`}}>
        <div style={S.glow(t.red)}/>
        <div style={{...S.label,paddingLeft:8}}>Non-Compliance Penalty Estimation</div>
        <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(3,1fr)",gap:8,paddingLeft:0}}>
          {segments.map((seg,i)=>{
            const gap = Math.max(0,seg.obl-seg.ach);
            const penaltyRate = 0.50; // ₹ per unit short
            const penaltyAmt = Math.round(gap*1000000*penaltyRate/100);
            return (
              <div key={i} style={{background:t.bgInner,borderRadius:5,padding:"10px"}}>
                <div style={{fontSize:9,color:t.textDim,marginBottom:4}}>{seg.icon} {seg.l}</div>
                <div style={{fontSize:9}}><span style={{color:t.textDim}}>Shortfall: </span><span style={{color:t.red,fontWeight:700}}>{gap.toFixed(1)}%</span></div>
                <div style={{fontSize:9}}><span style={{color:t.textDim}}>Est. Penalty: </span><span style={{color:gap>0?t.red:t.green,fontWeight:700}}>{gap>0?`₹${penaltyAmt.toLocaleString("en-IN")}`:"NIL"}</span></div>
              </div>
            );
          })}
        </div>
        <div style={{marginTop:10,paddingLeft:8,fontSize:9,color:t.textDim,lineHeight:1.6,padding:"8px",background:`${t.red}06`,borderRadius:5,border:`1px solid ${t.red}15`}}>
          🧠 AI Recommendation: Purchase {rcsGap.toLocaleString()} RCS on IEX-REC platform before Q4. Commission 1.2 MWp additional solar under PM Surya Ghar to close solar RPO gap organically. This will also qualify for additional DISCOM subsidy under RDSS.
        </div>
      </div>
    </div>
  );
}

      <div style={{...S.card,marginBottom:12}}>

// ─── ASSET ANALYTICS ──────────────────────────────────────────────────────
function AssetAnalytics({asset,onBack,mob}){
  const t=S.t;
  const timeLabels=useMemo(()=>Array.from({length:48},(_,i)=>{const h=Math.floor(i/2);const m=i%2===0?"00":"30";return `${String(h).padStart(2,"0")}:${m}`;}),[]);
  const profile=useMemo(()=>{
    const baseLoad=asset.capacityKva||asset.capacity||asset.maxKw||asset.count*0.8||100;
    const consumption=timeLabels.map((_,i)=>{const h=i/2;const nightBase=0.25+rand(0,0.05);const morningPeak=h>=7&&h<=10?0.7+rand(0,0.15):0;const afternoon=h>=12&&h<=16?0.45+rand(0,0.1):0;const eveningPeak=h>=18&&h<=22?0.85+rand(0,0.15):0;const mult=Math.max(nightBase,morningPeak,afternoon,eveningPeak);return Math.round(baseLoad*mult*rand(0.9,1.1));});
    const hasSolar=asset.assetType!=="ev_charger"&&asset.assetType!=="ev_park";
    const solarCap=hasSolar?baseLoad*rand(0.15,0.35):0;
    const solar=timeLabels.map((_,i)=>{const h=i/2;if(h<6||h>18||!hasSolar)return 0;return Math.round(solarCap*Math.sin(((h-6)/12)*Math.PI)*rand(0.7,1.0));});
    const evSpikes=[];const evSpikeIndices=new Set();
    for(let s=0;s<Math.floor(rand(2,5));s++){const startIdx=Math.floor(rand(14,44));const duration=Math.floor(rand(2,6));const spikePower=Math.round(rand(15,45));for(let d=0;d<duration&&startIdx+d<48;d++){consumption[startIdx+d]+=spikePower;evSpikeIndices.add(startIdx+d);if(d===0)evSpikes.push({idx:startIdx,power:spikePower,time:timeLabels[startIdx],duration:duration*0.5});}}
    const netConsumption=consumption.map((c,i)=>Math.max(0,c-solar[i]));
    const peakIdx=consumption.indexOf(Math.max(...consumption));
    return{consumption,solar,netConsumption,evSpikes,evSpikeIndices,peakIdx,peakKva:Math.max(...consumption),avgKva:Math.round(consumption.reduce((a,b)=>a+b,0)/48),totalSolar:solar.reduce((a,b)=>a+b,0),hasSolar};
  },[asset.id]);
  const maxVal=Math.max(...profile.consumption,...profile.solar);
  const chartW=mob?300:700;const chartH=140;const barW=chartW/48*0.7;const barGap=chartW/48*0.3;
  return(
    <div>
      <button onClick={onBack} style={{background:"none",border:`1px solid ${t.border}`,borderRadius:4,color:t.textDim,fontSize:9,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",marginBottom:10}}>← Back to Map</button>

          {profile.hasSolar&&(()=>{const pts=profile.solar.map((v,i)=>{const x=i*(barW+barGap)+barGap/2+barW/2;const y=chartH-(v/maxVal)*chartH;return `${x},${y}`;}).join(" ");const fillPts=`0,${chartH} ${pts} ${chartW},${chartH}`;return(<g><polygon points={fillPts} fill={`${t.yellow}15`}/><polyline points={pts} fill="none" stroke={t.yellow} strokeWidth="1.5" strokeLinejoin="round"/></g>);})()}
          {profile.evSpikes.map((sp,i)=>{const x=sp.idx*(barW+barGap)+barGap/2+barW/2;return(<g key={`ev${i}`}><line x1={x} y1={0} x2={x} y2={chartH} stroke={t.red} strokeWidth="0.5" strokeDasharray="2 2" opacity="0.5"/><text x={x} y={chartH+22} textAnchor="middle" fill={t.red} fontSize="5" fontWeight="700" fontFamily="inherit">EV?</text></g>);})}
        </svg>

      {profile.evSpikes.length>0&&(<div style={{...S.card,marginTop:10,borderColor:`${t.red}30`}}><div style={S.glow(t.red)}/><div style={S.label}>⚡ Potential EV Charging Events Detected</div>{profile.evSpikes.map((sp,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 8px",background:`${t.red}05`,borderLeft:`3px solid ${t.red}`,borderRadius:"0 4px 4px 0",marginBottom:4}}><div style={{fontSize:16}}>⚡</div><div style={{flex:1}}><div style={{fontSize:10,color:t.textBright,fontWeight:600}}>Spike at {sp.time} — +{sp.power} kVA for ~{sp.duration}h</div><div style={{fontSize:8,color:t.textDim,marginTop:1}}>Pattern matches Level 2 EV charger ({sp.power>30?"7-11 kW":"3-7 kW"} range)</div></div><div style={{textAlign:"center"}}><span style={{fontSize:14,fontWeight:800,color:t.red}}>{Math.round(70+rand(0,25))}%</span><div style={{fontSize:7,color:t.textDim}}>confidence</div></div></div>))}<div style={{marginTop:8,padding:"5px 7px",background:t.bgInner,borderRadius:3,fontSize:8,color:t.textDim}}>🧠 AI: Register EV load at this asset to enable demand response and reduce loss estimation errors.</div></div>)}
    </div>
  );
}

    </div>
  );

t.textMuted}}>excl. GST</div></div><button onClick={()=>setRequestedIds(prev=>new Set([...prev,dev.id]))} style={{padding:"6px 12px",fontSize:9,fontWeight:700,borderRadius:5,cursor:"pointer",fontFamily:"inherit",background:requested?`${t.green}20`:`${t.blue}18`,border:`1px solid ${requested?t.green+"40":t.blue+"40"}`,color:requested?t.green:t.blue}}>{requested?"✓ REQUESTED":"REQUEST SUPPLIER INFO"}</button></div></div>);})}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:t.textMuted,fontSize:11}}>No devices found matching your filters</div>}
    </div>
  );
}

          </div>
          <div>
            <div style={{fontSize:mob?12:15,fontWeight:700,letterSpacing:1,color:"#edf1f5"}}>SANKHYAGRID{!mob&&<span style={{fontSize:11,color:"#7c8da3",fontWeight:400,marginLeft:6}}>सांख्य</span>}</div>
            {!mob&&<div style={{fontSize:9,color:"#7c8da3",letterSpacing:1.5}}>{L.platform}</div>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:mob?6:10}}>
          <div style={{display:"flex",alignItems:"center",gap:4,fontSize:mob?8:10,color:"#6b8f71",background:"rgba(107,143,113,0.15)",padding:"3px 9px",borderRadius:4,border:"1px solid rgba(107,143,113,0.3)"}}>
            <div style={{width:5,height:5,borderRadius:"50%",background:"#6b8f71",animation:"pulse 2s infinite"}}/>{L.live}
          </div>
          {!mob&&<div style={{fontSize:10,color:"#7c8da3"}}>{data.timestamp.toLocaleTimeString()}</div>}
          <button onClick={()=>setLang(l=>l==="en"?"hi":"en")} style={{height:32,borderRadius:6,border:"1px solid rgba(124,141,163,0.3)",background:"rgba(255,255,255,0.08)",cursor:"pointer",fontSize:10,padding:"0 10px",fontFamily:"inherit",color:"#edf1f5",fontWeight:600}}>{lang==="en"?"हिं":"EN"}</button>
          <button onClick={()=>setTheme(th=>th==="dark"?"light":"dark")} style={{width:32,height:32,borderRadius:6,border:"1px solid rgba(124,141,163,0.3)",background:"rgba(255,255,255,0.08)",cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}} title={theme==="dark"?"Light mode":"Dark mode"}>{theme==="dark"?"☀️":"🌙"}</button>
        </div>
      </header>

      {/* Sector Bar */}
      <div style={{display:"flex",alignItems:"center",background:t.bgHeader,borderBottom:`1px solid ${t.border}`,padding:mob?"6px 8px":"6px 20px",gap:mob?4:8}}>
        {[{key:"generation",label:L.generation,icon:"⚡",color:"#d4a843",available:true},{key:"transmission",label:L.transmission,icon:"🔗",color:"#7b6b9e",available:false},{key:"distribution",label:L.distribution,icon:"🔌",color:"#2a7d8c",available:true}].map(s=>{
          const isActive=sector===s.key;
          return(<button key={s.key} onClick={()=>s.available&&setSector(s.key)} style={{display:"flex",alignItems:"center",gap:5,padding:mob?"6px 10px":"7px 16px",fontSize:mob?9:11,fontWeight:isActive?800:600,fontFamily:"inherit",cursor:s.available?"pointer":"default",background:isActive?`${s.color}15`:"transparent",color:isActive?s.color:s.available?t.textDim:`${t.textMuted}80`,border:isActive?`1.5px solid ${s.color}40`:`1px solid ${t.border}`,borderRadius:6,opacity:s.available?1:0.6,transition:"all 0.2s"}}>
            <span>{s.icon}</span><span>{s.label}</span>
            {!s.available&&<span style={{fontSize:7,color:t.textMuted,background:`${t.textMuted}15`,padding:"1px 4px",borderRadius:3,marginLeft:2}}>{L.soon}</span>}
          </button>);
        })}
      </div>

      {/* Sector Content */}
      {sector==="generation"&&<GenerationSector mob={mob}/>}
      {sector==="transmission"&&(
        <main style={{padding:mob?16:40,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:16}}>🔗</div>
            <div style={{fontSize:20,fontWeight:800,color:t.textBright,marginBottom:8}}>{L.transTitle}</div>
            <div style={{fontSize:12,color:t.textDim,maxWidth:400,lineHeight:1.6,marginBottom:20}}>{L.transDesc}</div>
            <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 20px",background:`${t.textMuted}10`,border:`1px solid ${t.border}`,borderRadius:8,fontSize:11,color:t.textDim}}>🚧 {L.comingSoon}</div>
            <div style={{marginTop:16,fontSize:9,color:t.textMuted}}>{L.switchTo} <button onClick={()=>setSector("distribution")} style={{background:"none",border:"none",color:t.green,cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,textDecoration:"underline"}}>{L.distribution}</button> {L.toExplore}</div>
          </div>
        </main>
      )}
      {sector==="distribution"&&(
        <>
          <nav style={{...S.nav,padding:mob?"0 8px":"0 20px"}}>
            {distTabs.map(tb=><button key={tb.key} style={{...S.navBtn(tab===tb.key),padding:mob?"8px 10px":"9px 14px",fontSize:mob?9:10}} onClick={()=>setTab(tb.key)}>{tb.label}</button>)}
          </nav>
          <main style={{padding:mob?8:16}}>
            {tab==="gis"&&<GISView data={data} mob={mob}/>}
            {tab==="network"&&<NetworkOverview data={data} mob={mob}/>}
            {tab==="scada"&&<SCADAView data={data} mob={mob}/>}
            {tab==="monitoring"&&<Monitoring data={data} feederHistory={feederHistory} mob={mob}/>}
            {tab==="alerts"&&<AlertsView alerts={alerts} mob={mob}/>}
            {tab==="predictive"&&<PredictiveView data={data} mob={mob}/>}
            {tab==="der"&&<DERView data={data} mob={mob}/>}
            {tab==="marketplace"&&<Marketplace mob={mob}/>}
          </main>
        </>
      )}
      <footer style={{padding:"8px 20px",borderTop:`1px solid ${t.border}`,display:"flex",justifyContent:"center",fontSize:9,color:t.textFaint}}>
        <span>{L.footer}</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(SankhyaGridApp));
</script>
</body>
</html>
